[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/auth/config"
  to = "/.netlify/functions/auth-config"
  status = 200

[[redirects]]
  from = "/api/auth/google"
  to = "/.netlify/functions/auth-google"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200

[[redirects]]
  from = "/api/admin/overview"
  to = "/.netlify/functions/admin-overview"
  status = 200
