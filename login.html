<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Vtn Meditation</title>
  <meta name="description" content="Sign in to your Vtn Meditation practice space.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="login.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="login-glow login-glow-left"></div>
  <div class="login-glow login-glow-right"></div>

  <main class="login-shell">
    <div class="login-card">
      <p class="login-eyebrow">Vtn Meditation</p>
      <h1 class="login-heading">Welcome back.</h1>
      <p class="login-copy">
        Sign in to continue your meditation practice and track your journey.
      </p>

      <div class="login-divider"></div>

      <div id="google-signin-container">
        <div
          id="g_id_onload"
          data-callback="handleGoogleSignIn"
          data-auto_prompt="false"
        ></div>
        <div
          class="g_id_signin"
          data-type="standard"
          data-shape="pill"
          data-theme="outline"
          data-text="signin_with"
          data-size="large"
          data-logo_alignment="left"
          data-width="320"
        ></div>
      </div>

      <p class="login-status" id="login-status"></p>

      <div class="login-footer">
        <p>Your data is encrypted and stored locally.</p>
      </div>
    </div>
  </main>

  <script>
    // Fetch Google Client ID from server config
    (async function initLogin() {
      try {
        // Check if already logged in
        const meResponse = await fetch("/api/auth/me");
        if (meResponse.ok) {
          window.location.href = "/";
          return;
        }
      } catch {
        // Not logged in — continue showing login page
      }

      // Load the Google Client ID dynamically
      try {
        const configResponse = await fetch("/api/auth/config");
        const config = await configResponse.json();

        if (config.googleClientId) {
          const onloadDiv = document.getElementById("g_id_onload");
          onloadDiv.setAttribute("data-client_id", config.googleClientId);

          // Re-initialize Google Identity Services
          if (window.google && window.google.accounts) {
            window.google.accounts.id.initialize({
              client_id: config.googleClientId,
              callback: handleGoogleSignIn,
            });
            window.google.accounts.id.renderButton(
              document.querySelector(".g_id_signin"),
              {
                type: "standard",
                shape: "pill",
                theme: "outline",
                text: "signin_with",
                size: "large",
                logo_alignment: "left",
                width: 320,
              }
            );
          }
        } else {
          document.getElementById("login-status").textContent =
            "Google Sign-In is not configured. Add GOOGLE_CLIENT_ID to .env";
        }
      } catch {
        document.getElementById("login-status").textContent =
          "Could not load sign-in configuration.";
      }
    })();

    async function handleGoogleSignIn(response) {
      const statusEl = document.getElementById("login-status");
      statusEl.textContent = "Signing in…";

      try {
        const result = await fetch("/api/auth/google", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential }),
        });

        const data = await result.json();

        if (data.ok) {
          statusEl.textContent = `Welcome, ${data.user.name}!`;
          setTimeout(() => {
            window.location.href = "/";
          }, 600);
        } else {
          statusEl.textContent = data.error || "Sign-in failed. Please try again.";
        }
      } catch (error) {
        statusEl.textContent = "Network error. Please try again.";
      }
    }
  </script>
</body>
</html>
